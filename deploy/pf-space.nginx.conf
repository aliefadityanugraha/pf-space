# Nginx Configuration for PF Space
# =============================================================================
# File ini adalah template konfigurasi Nginx untuk reverse proxy.
#
# CARA PAKAI:
#   1. Ganti semua "yourdomain.com" dengan domain/IP server kamu
#   2. sudo cp pf-space.nginx.conf /etc/nginx/sites-available/pf-space
#   3. sudo ln -s /etc/nginx/sites-available/pf-space /etc/nginx/sites-enabled/
#   4. sudo nginx -t
#   5. sudo systemctl reload nginx
#   6. (Opsional, jika punya domain): sudo certbot --nginx -d yourdomain.com
# =============================================================================

# Redirect HTTP -> HTTPS (aktifkan setelah certbot)
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # Ganti dengan domain atau IP server kamu
    server_name yourdomain.com;

    # ---------------------------------------------------------------------------
    # Keamanan dasar
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ---------------------------------------------------------------------------
    # Penting untuk Better-Auth + Reverse Proxy
    # Header ini memberitahu backend IP asli client
    # ---------------------------------------------------------------------------
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # ---------------------------------------------------------------------------
    # Increase batas upload untuk Tus.io (resumable upload)
    # ---------------------------------------------------------------------------
    client_max_body_size 10G;
    proxy_request_buffering off;

    # ---------------------------------------------------------------------------
    # Frontend (Vue 3 SPA - build static files)
    # ---------------------------------------------------------------------------
    location / {
        root /var/www/pf-space/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---------------------------------------------------------------------------
    # Backend API (Fastify pada port 3000)
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Timeout diperpanjang untuk operasi lama (misal AI processing)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Better-Auth routes
    location /api/auth/ {
        proxy_pass http://localhost:3000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Cookie $http_cookie;

        # Penting untuk cookie session yang benar
        proxy_cookie_path / /;
        proxy_cookie_domain localhost $host;
    }

    # Tus resumable upload endpoint
    location /uploads/tus/ {
        proxy_pass http://localhost:3000/uploads/tus/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Tus membutuhkan buffering off
        proxy_request_buffering off;
        proxy_buffering off;

        # Timeout sangat panjang untuk upload besar
        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # ---------------------------------------------------------------------------
    # Static files yang di-serve backend (poster, thumbnail, dll)
    # ---------------------------------------------------------------------------
    location /uploads/ {
        proxy_pass http://localhost:3000/uploads/;
        proxy_http_version 1.1;

        # Cache media files
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;
}

